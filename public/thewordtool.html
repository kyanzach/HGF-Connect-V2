<title>THE WORD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #111;
    color: #eee;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Editor View ── */
  #editor-view {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px 32px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── Header row ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  #header h1 { font-size: 24px; color: #fff; }

  #file-name {
    font-size: 14px;
    color: #888;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #file-name .unsaved { color: #f59e0b; }
  #file-name .cloud { color: #22c55e; font-size: 12px; }

  /* ── Save toast ── */
  #save-toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: #22c55e;
    color: #000;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    z-index: 200;
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    pointer-events: none;
  }
  #save-toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  #save-toast.error {
    background: #ef4444;
    color: #fff;
  }

  /* ── File menu bar ── */
  #file-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 8px;
    position: relative;
  }

  .file-btn {
    background: transparent;
    color: #999;
    border: none;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
    transition: all 0.12s;
  }

  .file-btn:hover { background: #222; color: #fff; }
  .file-btn kbd { font-size: 11px; color: #666; margin-left: 6px; }

  /* ── Open panel ── */
  #open-panel {
    display: none;
    position: absolute;
    top: 32px;
    left: 0;
    width: 420px;
    max-height: 380px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 50;
    overflow: hidden;
    flex-direction: column;
  }

  #open-panel.visible { display: flex; }

  #open-panel .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #open-panel .panel-close {
    background: none; border: none; color: #888; cursor: pointer; font-size: 18px;
  }

  #file-list {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
  }

  #file-list .empty {
    padding: 24px 16px;
    text-align: center;
    color: #666;
    font-size: 13px;
  }

  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .file-item:hover { background: #2a2a2a; }

  .file-item .fi-info { flex: 1; min-width: 0; }

  .file-item .fi-name {
    font-size: 14px;
    color: #ddd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-item .fi-date {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
  }

  .file-item .fi-delete {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }

  .file-item .fi-delete:hover { color: #f87171; background: #2a2020; }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 10px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    flex-wrap: wrap;
  }

  .tb-btn {
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 6px 12px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.12s;
    font-family: inherit;
    line-height: 1;
  }

  .tb-btn:hover { background: #3a3a3a; color: #fff; }
  .tb-btn:active, .tb-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .tb-btn .lbl-b { font-weight: 700; }
  .tb-btn .lbl-i { font-style: italic; }
  .tb-btn .lbl-u { text-decoration: underline; }

  .tb-sep {
    width: 1px;
    height: 22px;
    background: #333;
    margin: 0 6px;
  }

  /* ── Rich editor ── */
  #script-editor {
    flex: 1;
    width: 100%;
    background: #1a1a1a;
    color: #ddd;
    border: 1px solid #333;
    border-radius: 0 0 8px 8px;
    padding: 20px;
    font-size: 16px;
    line-height: 1.8;
    overflow-y: auto;
    outline: none;
    min-height: 200px;
  }

  #script-editor:focus { border-color: #555; }

  #script-editor h1 { font-size: 26px; font-weight: 700; color: #fff; margin: 8px 0; }
  #script-editor h2 { font-size: 20px; font-weight: 600; color: #bbb; margin: 6px 0; }
  #script-editor hr { border: none; border-top: 2px solid #444; margin: 16px 0; }

  #script-editor ol, #script-editor ul {
    margin: 8px 0;
    padding-left: 28px;
    color: #ddd;
  }

  #script-editor li { margin-bottom: 4px; }

  #script-editor blockquote {
    border-left: 4px solid #555;
    padding: 8px 16px;
    margin: 12px 0;
    color: #bbb;
    font-style: italic;
    background: rgba(255,255,255,0.03);
  }

  #script-editor .cue {
    background: #1a1a2e;
    border: 1px solid #3b3b7a;
    border-left: 4px solid #6366f1;
    border-radius: 6px;
    padding: 10px 16px;
    margin: 12px 0;
    color: #a5b4fc;
    font-size: 14px;
    font-weight: 500;
  }

  #script-editor .next-slide {
    background: #1a2e1a;
    border: 1px solid #3b7a3b;
    border-left: 4px solid #22c55e;
    border-radius: 6px;
    padding: 10px 16px;
    margin: 12px 0;
    color: #86efac;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #start-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
  }

  #service-type {
    padding: 10px 14px;
    font-size: 14px;
    background: #1a1a1a;
    color: #ccc;
    border: 1px solid #333;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }

  #service-type:focus { border-color: #555; outline: none; }

  #start-btn {
    flex: 1;
    padding: 14px 0;
    font-size: 18px;
    font-weight: 600;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #start-btn:hover { background: #1d4ed8; }

  /* ── Prompter View ── */
  #prompter-view {
    display: none;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }

  #prompter-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #prompter-container::before,
  #prompter-container::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 80px;
    z-index: 2;
    pointer-events: none;
  }

  #prompter-container::before {
    top: 0;
    background: linear-gradient(to bottom, #111, transparent);
  }

  #prompter-container::after {
    bottom: 0;
    background: linear-gradient(to top, #111, transparent);
  }

  #prompter-scroll {
    height: 100%;
    overflow-y: auto;
    scroll-behavior: auto;
    padding: 40vh 10vw;
    scrollbar-width: none;
    font-size: clamp(28px, 4vw, 48px);
    line-height: 1.6;
    color: #eee;
    font-weight: 400;
  }

  #prompter-scroll::-webkit-scrollbar { display: none; }
  #prompter-scroll:focus { outline: none; }

  #prompter-scroll p,
  #prompter-scroll div:not(#prompter-scroll) {
    margin-bottom: 24px;
  }

  #prompter-scroll strong, #prompter-scroll b { color: #fff; font-weight: 700; }
  #prompter-scroll em, #prompter-scroll i { font-style: italic; }
  #prompter-scroll u { text-decoration: underline; text-underline-offset: 4px; }

  #prompter-scroll h1 {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  #prompter-scroll h2 {
    font-size: clamp(24px, 3.5vw, 40px);
    font-weight: 500;
    color: #aaa;
    margin-bottom: 28px;
  }

  #prompter-scroll hr { border: none; border-top: 2px solid #444; margin: 28px 0; }

  #prompter-scroll ol, #prompter-scroll ul {
    margin: 16px 0;
    padding-left: 40px;
  }

  #prompter-scroll li {
    margin-bottom: 12px;
  }
  #prompter-scroll.mirrored { transform: scaleX(-1); }

  #prompter-scroll blockquote {
    border-left: 4px solid #555;
    padding: 12px 24px;
    margin: 20px 0;
    color: #ccc;
    font-style: italic;
    font-size: clamp(22px, 3vw, 38px);
  }

  #prompter-scroll .cue {
    background: rgba(99, 102, 241, 0.1);
    border: 2px solid #6366f1;
    border-radius: 10px;
    padding: 16px 24px;
    margin: 24px 0;
    color: #a5b4fc;
    font-size: clamp(20px, 2.8vw, 34px);
    font-weight: 500;
    text-align: center;
  }

  #prompter-scroll .next-slide {
    background: rgba(34, 197, 94, 0.1);
    border: 2px solid #22c55e;
    border-radius: 10px;
    padding: 16px 24px;
    margin: 24px 0;
    color: #86efac;
    font-size: clamp(20px, 2.8vw, 34px);
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* ── Controls Bar ── */
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 24px;
    background: #1a1a1a;
    border-top: 1px solid #333;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    background: #333;
    color: #eee;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
    font-weight: 500;
    min-width: 44px;
    text-align: center;
  }

  .ctrl-btn:hover { background: #444; }
  .ctrl-btn.active { background: #2563eb; color: #fff; }

  .ctrl-btn.play-btn { width: 56px; height: 44px; font-size: 20px; }

  #speed-display { color: #aaa; font-size: 14px; min-width: 80px; text-align: center; }

  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .divider { width: 1px; height: 28px; background: #333; margin: 0 4px; }
  #mode-label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

  #back-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(40,40,40,0.8);
    color: #aaa;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  #back-btn:hover { color: #fff; background: rgba(60,60,60,0.9); }

  /* ── Progress Bar ── */
  #progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 10px;
    width: 0%;
    background: #ef4444;
    z-index: 20;
    transition: width 0.1s linear;
    border-radius: 0 0 4px 0;
  }

  /* ── Timer ── */
  #timer-display {
    font-size: 16px;
    font-weight: 600;
    color: #eee;
    font-variant-numeric: tabular-nums;
    min-width: 70px;
    text-align: center;
  }

  #timer-display.paused { color: #f59e0b; }

  .ctrl-btn.timer-btn { font-size: 13px; padding: 8px 12px; }

  /* ── Timer Overlay (big visible timer in prompter) ── */
  #timer-overlay {
    position: absolute;
    top: 16px;
    right: 20px;
    z-index: 10;
    text-align: right;
    pointer-events: none;
  }

  #overlay-total {
    display: block;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 800;
    color: rgba(239, 68, 68, 0.45);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  #overlay-section {
    display: block;
    text-align: center;
    padding: 10px 0;
    font-size: clamp(20px, 3vw, 28px);
    color: rgba(255,255,255,0.45);
    font-variant-numeric: tabular-nums;
    background: #111;
    white-space: nowrap;
  }

  /* ── Bookmark ── */
  #prompter-scroll .tp-marked {
    position: relative;
    background: rgba(239, 68, 68, 0.08);
    border-left: 4px solid #ef4444;
    padding-left: 20px;
    margin-left: -24px;
    border-radius: 0 4px 4px 0;
  }

  .ctrl-btn.mark-btn { font-size: 13px; }
  .ctrl-btn.mark-btn.has-mark { background: #ef4444; color: #fff; }

  /* ── History Panel ── */
  #history-panel {
    display: none;
    position: absolute;
    top: 32px;
    right: 0;
    width: 480px;
    max-height: 460px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 50;
    overflow: hidden;
    flex-direction: column;
  }

  #history-panel.visible { display: flex; }

  #history-panel .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #history-panel .panel-close {
    background: none; border: none; color: #888; cursor: pointer; font-size: 18px;
  }

  #history-stats {
    display: flex;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid #2a2a2a;
    flex-wrap: wrap;
  }

  .kpi-card {
    flex: 1;
    min-width: 90px;
    background: #252525;
    border-radius: 6px;
    padding: 10px 12px;
    text-align: center;
  }

  .kpi-card .kpi-value {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .kpi-card .kpi-label {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #history-list {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
  }

  #history-list .empty {
    padding: 24px 16px;
    text-align: center;
    color: #666;
    font-size: 13px;
  }

  .session-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    transition: background 0.1s;
  }

  .session-item:hover { background: #2a2a2a; }

  .session-item .si-info { flex: 1; min-width: 0; }

  .session-item .si-title {
    font-size: 14px;
    color: #ddd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-item .si-meta {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
  }

  .session-item .si-duration {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    font-variant-numeric: tabular-nums;
    margin-left: 12px;
    white-space: nowrap;
  }

  .session-item .si-delete {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }

  .session-item .si-delete:hover { color: #f87171; background: #2a2020; }

  #history-clear {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 12px;
    padding: 4px 8px;
  }

  #history-clear:hover { color: #f87171; }

  /* ── Section Breakdown in History ── */
  .section-breakdown {
    display: none;
    padding: 4px 16px 10px;
    background: #191919;
    border-top: 1px solid #2a2a2a;
  }

  .session-item.expanded + .section-breakdown { display: block; }

  .section-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
  }

  .section-row .sr-text {
    flex: 1;
    color: #999;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .section-row .sr-time {
    color: #eee;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 45px;
    text-align: right;
  }

  .section-row .sr-bar-wrap {
    width: 60px;
    height: 5px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .section-row .sr-bar {
    height: 100%;
    background: #ef4444;
    border-radius: 3px;
  }

  .session-item .si-expand {
    color: #555;
    font-size: 12px;
    margin-left: 4px;
    transition: transform 0.15s;
  }

  .session-item.expanded .si-expand { transform: rotate(90deg); }

  /* ── Completion Screen ── */
  #completion-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;

<body>
<div id="save-toast"></div>

<!-- ── FILE MANAGER MODAL ── -->

<!-- ── EDITOR VIEW ── -->

<script>
(async function () {
  // ── DOM refs ──
  const editor       = document.getElementById('script-editor');
  const startBtn     = document.getElementById('start-btn');
  const editorView   = document.getElementById('editor-view');
  const prompterView = document.getElementById('prompter-view');
  const scrollEl     = document.getElementById('prompter-scroll');
  const progressBar  = document.getElementById('progress-bar');
  const timerDisplay = document.getElementById('timer-display');
  const timerBtn     = document.getElementById('timer-btn');
  const markBtn      = document.getElementById('mark-btn');
  const returnBtn    = document.getElementById('return-btn');
  const playBtn      = document.getElementById('play-btn');
  const slowerBtn    = document.getElementById('slower-btn');
  const fasterBtn    = document.getElementById('faster-btn');
  const upBtn        = document.getElementById('up-btn');
  const downBtn      = document.getElementById('down-btn');
  const modeBtn      = document.getElementById('mode-btn');
  const mirrorBtn    = document.getElementById('mirror-btn');
  const topBtn       = document.getElementById('top-btn');
  const backBtn      = document.getElementById('back-btn');
  const speedDisplay = document.getElementById('speed-display');
  const modeLabel    = document.getElementById('mode-label');
  const fileNameEl   = document.getElementById('file-name');
  const openPanel    = document.getElementById('open-panel');
  const fileList     = document.getElementById('file-list');
  const fsBtn        = document.getElementById('fs-btn');
  const timerResetBtn = document.getElementById('timer-reset-btn');
  const overlayTotal  = document.getElementById('overlay-total');
  const overlaySection = document.getElementById('overlay-section');
  const completionOverlay = document.getElementById('completion-overlay');
  const completionTime = document.getElementById('completion-time');
  const completionMsg  = document.getElementById('completion-msg');
  const completionBtn  = document.getElementById('completion-btn');
  const serviceTypeEl  = document.getElementById('service-type');

  let speed = 3;
  let isPlaying = false;
  let isManual = false;
  let animFrame = null;
  let inPrompter = false;

  // Timer state
  let timerSeconds = 0;
  let timerInterval = null;
  let timerRunning = false;

  // Bookmark state
  let bookmarkScrollTop = null;
  let bookmarkEl = null;

  // Section timing state
  let sectionTimings = [];
  let currentSectionEl = null;
  let currentSectionStartTime = 0;
  let sectionScrollDebounce = null;

  // ══════════════════════════════════════
  //  FILE MANAGEMENT
  //  • Save → smart (remembers destination per title)
  //  • Save To Server → always server (file manager)
  //  • Save To Local → always local file
  //  • Open → Local or Server choice
  // ══════════════════════════════════════
  const RECENTS_KEY = 'teleprompter_recents';
  const DRAFT_KEY = 'teleprompter_draft';
  const DRAFT_NAME_KEY = 'teleprompter_draft_name';
  const TIMER_KEY = 'teleprompter_timer';
  const BOOKMARK_KEY = 'teleprompter_bookmark';
  const SESSIONS_KEY = 'teleprompter_sessions';
  const SESSIONS_API = 'sessions.php';
  const SERVICE_TYPE_KEY = 'teleprompter_service_type';
  const SAVE_PREFS_KEY = 'teleprompter_save_prefs';
  const SCRIPTS_API = '/api/thewordtool';
  const FOLDERS_API = '/api/thewordtool/folders';
  const saveToast = document.getElementById('save-toast');

  let serverAvailable = null;
  let currentFileName = null;
  let currentFolder = null;
  let savedToServer = false;
  let fileHandle = null;
  let isDirty = false;
  const folderPasswords = {};

  // Restore service type preference
  const savedServiceType = localStorage.getItem(SERVICE_TYPE_KEY);
  if (savedServiceType) serviceTypeEl.value = savedServiceType;
  serviceTypeEl.addEventListener('change', () => localStorage.setItem(SERVICE_TYPE_KEY, serviceTypeEl.value));

  // ── IndexedDB helpers ──
  function openHandleDB() {
    return new Promise((resolve) => {
      const req = indexedDB.open('hgf_teleprompter', 1);
      req.onupgradeneeded = (e) => e.target.result.createObjectStore('handles');
      req.onsuccess = (e) => resolve(e.target.result);
      req.onerror = () => resolve(null);
    });
  }
  async function storeFileHandle(handle) {
    try { const db = await openHandleDB(); if (!db) return; db.transaction('handles','readwrite').objectStore('handles').put(handle,'current'); } catch {}
  }
  async function loadFileHandle() {
    try { const db = await openHandleDB(); if (!db) return null; return new Promise(r => { const req = db.transaction('handles','readonly').objectStore('handles').get('current'); req.onsuccess = () => r(req.result||null); req.onerror = () => r(null); }); } catch { return null; }
  }
  async function clearStoredHandle() {
    try { const db = await openHandleDB(); if (!db) return; db.transaction('handles','readwrite').objectStore('handles').delete('current'); } catch {}
  }
  async function verifyPermission(handle) {
    if (!handle) return false;
    try { if ((await handle.queryPermission({mode:'readwrite'})) === 'granted') return true; if ((await handle.requestPermission({mode:'readwrite'})) === 'granted') return true; } catch {}
    return false;
  }

  function getRecents() { try { return JSON.parse(localStorage.getItem(RECENTS_KEY)) || []; } catch { return []; } }
  function addToRecents(name, content) {
    let recents = getRecents().filter(r => r.name !== name);
    recents.unshift({ name, content, date: Date.now() });
    if (recents.length > 20) recents.length = 20;
    localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
  }

  // ── Save preferences (per title) ──
  function getSavePrefs() { try { return JSON.parse(localStorage.getItem(SAVE_PREFS_KEY)) || {}; } catch { return {}; } }
  function setSavePref(title, dest, folder) { const p = getSavePrefs(); p[title] = { dest, folder: folder||null }; localStorage.setItem(SAVE_PREFS_KEY, JSON.stringify(p)); }

  // ── Toast ──
  function showToast(msg, isError) {
    saveToast.textContent = msg;
    saveToast.className = isError ? 'visible error' : 'visible';
    clearTimeout(saveToast._t);
    saveToast._t = setTimeout(() => { saveToast.className = ''; }, 2200);
  }

  function updateTitle() {
    const name = currentFileName || 'Untitled';
    const badge = savedToServer ? ' <span class="cloud">☁</span>' : '';
    fileNameEl.innerHTML = isDirty ? `${name}${badge} <span class="unsaved">●</span>` : `${name}${badge}`;
    document.title = `${name} — THE WORD`;
  }

  function syncDraft() {
    localStorage.setItem(DRAFT_KEY, editor.innerHTML);
    localStorage.setItem(DRAFT_NAME_KEY, currentFileName || '');
  }

  editor.addEventListener('input', () => { isDirty = true; updateTitle(); syncDraft(); });

  // ══════════════════════════════════════
  //  FILE MANAGER (server folders + scripts)
  // ══════════════════════════════════════
  const fmOverlay = document.getElementById('fm-overlay');
  const fmTitle = document.getElementById('fm-title');
  const fmBreadcrumb = document.getElementById('fm-breadcrumb');
  const fmPwArea = document.getElementById('fm-pw-area');
  const fmBody = document.getElementById('fm-body');
  const fmFooter = document.getElementById('fm-footer');
  let fmMode = 'open';
  let fmCurrentFolder = null;

  document.getElementById('fm-close').addEventListener('click', closeFM);
  fmOverlay.addEventListener('click', (e) => { if (e.target === fmOverlay) closeFM(); });

  function closeFM() { fmOverlay.classList.remove('visible'); fmCurrentFolder = null; fmPwArea.innerHTML = ''; }

  function openFM(mode) {
    fmMode = mode;
    fmCurrentFolder = null;
    fmTitle.textContent = mode === 'save' ? '☁ Save to Server' : '☁ Open from Server';
    fmBreadcrumb.style.display = 'none';
    fmPwArea.innerHTML = '';
    fmOverlay.classList.add('visible');
    renderFMFolders();
  }

  async function renderFMFolders() {
    fmBody.innerHTML = '<div class="fm-loading">Loading…</div>';
    fmFooter.innerHTML = '';
    fmBreadcrumb.style.display = 'none';
    fmPwArea.innerHTML = '';

    let folders = [];
    try { const res = await fetch(FOLDERS_API); if (res.ok) folders = await res.json(); } catch {}

    if (folders.length === 0) {
      fmBody.innerHTML = '<div class="fm-empty">No folders yet.</div>';
    } else {
      fmBody.innerHTML = folders.map(f => `
        <div class="fm-item" data-folder="${f.name}" data-locked="${f.locked}">
          <span class="fm-icon">${f.locked ? '🔒' : '📁'}</span>
          <div class="fm-info">
            <div class="fm-name">${f.name}</div>
            <div class="fm-meta">${f.scriptCount} script${f.scriptCount !== 1 ? 's' : ''}</div>
          </div>
          <div class="fm-actions">
            <button class="fm-act" data-action="rename" data-folder="${f.name}" title="Rename">✏</button>
            <button class="fm-act" data-action="${f.locked ? 'unlock' : 'lock'}" data-folder="${f.name}" title="${f.locked ? 'Unlock' : 'Lock'}">${f.locked ? '🔓' : '🔒'}</button>
            <button class="fm-act danger" data-action="delete" data-folder="${f.name}" title="Delete">🗑</button>
          </div>
        </div>`).join('');
    }

    fmFooter.innerHTML = '<button class="fm-btn primary" id="fm-new-folder">➕ New Folder</button>';

    // Click folder
    fmBody.querySelectorAll('.fm-item[data-folder]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.fm-act')) return;
        const name = el.dataset.folder;
        const locked = el.dataset.locked === 'true';
        if (locked && !folderPasswords[name]) {
          showPasswordPrompt(name, () => renderFMScripts(name));
        } else {
          renderFMScripts(name);
        }
      });
    });

    // Folder actions
    fmBody.querySelectorAll('.fm-act').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); handleFolderAction(btn.dataset.action, btn.dataset.folder); });
    });

    // New folder
    document.getElementById('fm-new-folder').addEventListener('click', async () => {
      const name = prompt('New folder name:');
      if (!name || !name.trim()) return;
      try {
        const res = await fetch(FOLDERS_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name.trim() }) });
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'Failed', true); return; }
        renderFMFolders();
      } catch { showToast('❌ Server error', true); }
    });
  }

  function showPasswordPrompt(folderName, onSuccess) {
    fmPwArea.innerHTML = `<div class="fm-pw-row"><span>🔒 ${folderName}:</span><input type="password" id="fm-pw-input" placeholder="Enter password" autocomplete="off"><button class="fm-btn primary" id="fm-pw-submit">Open</button><span class="fm-pw-error" id="fm-pw-error"></span></div>`;
    const input = document.getElementById('fm-pw-input');
    input.focus();
    const doSubmit = () => { const pw = input.value; if (!pw) { document.getElementById('fm-pw-error').textContent = 'Required'; return; } folderPasswords[folderName] = pw; fmPwArea.innerHTML = ''; onSuccess(); };
    document.getElementById('fm-pw-submit').addEventListener('click', doSubmit);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSubmit(); });
  }

  async function handleFolderAction(action, folder) {
    if (action === 'rename') {
      const newName = prompt('Rename folder to:', folder);
      if (!newName || !newName.trim() || newName.trim() === folder) return;
      const body = { name: folder, action: 'rename', newName: newName.trim() };
      if (folderPasswords[folder]) body.currentPassword = folderPasswords[folder];
      try {
        const res = await fetch(FOLDERS_API, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.status === 403) { showPasswordPrompt(folder, () => handleFolderAction(action, folder)); return; }
        if (!res.ok) { showToast(data.error || 'Failed', true); return; }
        if (folderPasswords[folder]) { folderPasswords[data.name] = folderPasswords[folder]; delete folderPasswords[folder]; }
        renderFMFolders();
      } catch { showToast('❌ Error', true); }
    } else if (action === 'lock') {
      const pw = prompt('Set password for "' + folder + '":');
      if (!pw) return;
      try {
        const res = await fetch(FOLDERS_API, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: folder, action: 'lock', password: pw }) });
        if (!res.ok) { showToast('Lock failed', true); return; }
        folderPasswords[folder] = pw;
        showToast('🔒 Folder locked');
        renderFMFolders();
      } catch { showToast('❌ Error', true); }
    } else if (action === 'unlock') {
      if (!folderPasswords[folder]) { showPasswordPrompt(folder, () => handleFolderAction('unlock', folder)); return; }
      try {
        const res = await fetch(FOLDERS_API, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: folder, action: 'unlock', currentPassword: folderPasswords[folder] }) });
        const data = await res.json();
        if (!res.ok) { delete folderPasswords[folder]; showToast(data.error || 'Failed', true); return; }
        delete folderPasswords[folder];
        showToast('🔓 Folder unlocked');
        renderFMFolders();
      } catch { showToast('❌ Error', true); }
    } else if (action === 'delete') {
      if (!confirm('Delete folder "' + folder + '" and all its scripts?')) return;
      const body = { name: folder };
      if (folderPasswords[folder]) body.password = folderPasswords[folder];
      try {
        const res = await fetch(FOLDERS_API, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.status === 403) { showPasswordPrompt(folder, () => handleFolderAction('delete', folder)); return; }
        if (!res.ok) { showToast(data.error || 'Failed', true); return; }
        delete folderPasswords[folder];
        renderFMFolders();
      } catch { showToast('❌ Error', true); }
    }
  }

  async function renderFMScripts(folderName) {
    fmCurrentFolder = folderName;
    fmBreadcrumb.style.display = 'flex';
    fmBreadcrumb.innerHTML = `<button class="fm-bc-link" id="fm-back-root">☁ Server</button><span>›</span><span>📁 ${folderName}</span>`;
    document.getElementById('fm-back-root').addEventListener('click', () => { fmCurrentFolder = null; fmBreadcrumb.style.display = 'none'; renderFMFolders(); });

    fmBody.innerHTML = '<div class="fm-loading">Loading…</div>';

    let scripts = [];
    try {
      const headers = {};
      if (folderPasswords[folderName]) headers['x-folder-password'] = folderPasswords[folderName];
      const res = await fetch(SCRIPTS_API + '?folder=' + encodeURIComponent(folderName), { headers });
      if (res.status === 403) { delete folderPasswords[folderName]; showPasswordPrompt(folderName, () => renderFMScripts(folderName)); fmBody.innerHTML = '<div class="fm-empty">🔒 Password required</div>'; return; }
      if (res.ok) scripts = await res.json();
    } catch {}

    if (scripts.length === 0) {
      fmBody.innerHTML = '<div class="fm-empty">No scripts in this folder.</div>';
    } else {
      fmBody.innerHTML = scripts.map(s => {
        const d = new Date(s.updatedAt);
        const dateStr = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        return `<div class="fm-item" data-script="${s.name}"><span class="fm-icon">📄</span><div class="fm-info"><div class="fm-name">${s.name}</div><div class="fm-meta">${dateStr}</div></div><div class="fm-actions"><button class="fm-act danger" data-del-script="${s.name}" title="Delete">🗑</button></div></div>`;
      }).join('');
    }

    if (fmMode === 'save') {
      fmFooter.innerHTML = `<input type="text" id="fm-save-name" value="${currentFileName || ''}" placeholder="Script name…" style="flex:1;padding:8px 10px;background:#111;border:1px solid #444;border-radius:6px;color:#eee;font-size:14px;font-family:inherit;outline:none"><button class="fm-btn primary" id="fm-save-btn">Save Here</button>`;
      document.getElementById('fm-save-name').focus();
      document.getElementById('fm-save-btn').addEventListener('click', async () => { const name = document.getElementById('fm-save-name').value.trim(); if (!name) { showToast('Enter a name', true); return; } await saveToServerFolder(folderName, name); });
      document.getElementById('fm-save-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('fm-save-btn').click(); });
    } else {
      fmFooter.innerHTML = '';
    }

    // Click script
    fmBody.querySelectorAll('.fm-item[data-script]').forEach(el => {
      el.addEventListener('click', async (e) => {
        if (e.target.closest('.fm-act')) return;
        if (fmMode === 'save') { const inp = document.getElementById('fm-save-name'); if (inp) inp.value = el.dataset.script; return; }
        const name = el.dataset.script;
        try {
          const headers = {};
          if (folderPasswords[folderName]) headers['x-folder-password'] = folderPasswords[folderName];
          const res = await fetch(SCRIPTS_API + '?folder=' + encodeURIComponent(folderName) + '&name=' + encodeURIComponent(name), { headers });
          if (!res.ok) throw new Error();
          const data = await res.json();
          currentFileName = data.name; currentFolder = folderName; savedToServer = true; fileHandle = null;
          editor.innerHTML = data.content;
          isDirty = false;
          setSavePref(data.name, 'server', folderName);
          updateTitle(); addToRecents(data.name, data.content); syncDraft();
          closeFM(); editor.focus();
          showToast('☁ Loaded from server');
        } catch { showToast('❌ Failed to load', true); }
      });
    });

    // Delete script
    fmBody.querySelectorAll('[data-del-script]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const name = btn.dataset.delScript;
        if (!confirm('Delete "' + name + '"?')) return;
        const body = { folder: folderName, name };
        if (folderPasswords[folderName]) body.password = folderPasswords[folderName];
        try { await fetch(SCRIPTS_API, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }); renderFMScripts(folderName); } catch { showToast('❌ Error', true); }
      });
    });
  }

  async function saveToServerFolder(folder, name) {
    const content = editor.innerHTML;
    const body = { folder, name, content };
    if (folderPasswords[folder]) body.password = folderPasswords[folder];
    try {
      const res = await fetch(SCRIPTS_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (res.status === 403) { delete folderPasswords[folder]; showToast('❌ Wrong password', true); return; }
      if (!res.ok) throw new Error();
      currentFileName = name; currentFolder = folder; savedToServer = true; isDirty = false;
      setSavePref(name, 'server', folder);
      updateTitle(); addToRecents(name, content); syncDraft();
      closeFM();
      showToast('☁ Saved to server');
    } catch { showToast('❌ Save failed', true); }
  }

  // ── Save To Local (direct) ──
  document.getElementById('btn-save-local').addEventListener('click', () => doSaveLocal());

  async function doSaveLocal() {
    const content = editor.innerHTML;
    if (window.showSaveFilePicker) {
      try {
        const opts = { suggestedName: (currentFileName || 'script') + '.html', types: [{ description: 'HTML file', accept: { 'text/html': ['.html'] } }] };
        if (fileHandle) opts.startIn = fileHandle;
        fileHandle = await window.showSaveFilePicker(opts);
        const writable = await fileHandle.createWritable();
        await writable.write(content); await writable.close();
        currentFileName = fileHandle.name.replace(/\.html?$/i, '');
        storeFileHandle(fileHandle);
      } catch (e) { if (e.name === 'AbortError') return; throw e; }
    } else {
      const name = prompt('File name:', currentFileName || 'script');
      if (!name || !name.trim()) return;
      currentFileName = name.trim();
      const blob = new Blob([content], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = currentFileName + '.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    savedToServer = false; currentFolder = null; isDirty = false;
    setSavePref(currentFileName, 'local');
    updateTitle(); addToRecents(currentFileName, content); syncDraft();
    showToast('💾 Saved locally');
  }

  // ── Open from disk ──
  async function doOpenFile() {
    if (isDirty && !confirm('You have unsaved changes. Open anyway?')) return;
    if (window.showOpenFilePicker) {
      try {
        const opts = { types: [{ description: 'HTML files', accept: { 'text/html': ['.html', '.htm'] } }], multiple: false };
        if (fileHandle) opts.startIn = fileHandle;
        const [handle] = await window.showOpenFilePicker(opts);
        fileHandle = handle; storeFileHandle(fileHandle);
        const file = await handle.getFile(); const text = await file.text();
        currentFileName = file.name.replace(/\.html?$/i, '');
        editor.innerHTML = text;
      } catch (e) { if (e.name === 'AbortError') return; throw e; }
    } else { fileInput.click(); return; }
    savedToServer = false; currentFolder = null; isDirty = false;
    updateTitle(); addToRecents(currentFileName, editor.innerHTML); syncDraft(); editor.focus();
  }

  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = '.html,.htm,.txt'; fileInput.style.display = 'none';
  document.body.appendChild(fileInput);
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      currentFileName = file.name.replace(/\.(html?|txt)$/i, '');
      fileHandle = null; savedToServer = false; currentFolder = null;
      editor.innerHTML = reader.result; isDirty = false;
      updateTitle(); addToRecents(currentFileName, reader.result); syncDraft(); editor.focus();
    };
    reader.readAsText(file); fileInput.value = '';
  });

    switch (cmd) {

        break;

        document.execCommand('formatBlock', false, 'H1');
        break;
      case 'h2':
        document.execCommand('formatBlock', false, 'H2');
        break;
      case 'p':
        document.execCommand('formatBlock', false, 'P');
        break;
      case 'quote':
        document.execCommand('formatBlock', false, 'BLOCKQUOTE');
        break;
      case 'ol':
        document.execCommand('insertOrderedList');

      case 'ul':
        document.execCommand('insertUnorderedList');
        break;
      case 'cue': {
        const sel = window.getSelection();
        let cueText = 'Cue: Enter stage direction here';
        if (sel && !sel.isCollapsed) {
          const frag = sel.getRangeAt(0).cloneContents();
          const tmp = document.createElement('div');
          tmp.appendChild(frag);
          cueText = tmp.innerHTML;
        }
        document.execCommand('insertHTML', false,
          '<div class="cue" contenteditable="true">' + cueText + '</div><p><br></p>');
        break;
      }
      case 'nextslide':
        document.execCommand('insertHTML', false,
          '<div class="next-slide" contenteditable="false">NEXT SLIDE</div><p><br></p>');
        break;
      case 'hr':
        document.execCommand('insertHTML', false, '<hr><p><br></p>');
        break;
      case 'removeFormat':
        document.execCommand('removeFormat');

  // ══════════════════════════════════════
  //  SESSION HISTORY (KPI)
  // ══════════════════════════════════════
  const historyPanel  = document.getElementById('history-panel');
  const historyStats  = document.getElementById('history-stats');
  const historyList   = document.getElementById('history-list');

  function getLocalSessions() {
    try { return JSON.parse(localStorage.getItem(SESSIONS_KEY)) || []; }
    catch { return []; }
  }

  async function fetchServerSessions() {
    try {
      const res = await fetch(SESSIONS_API);
      if (!res.ok) throw new Error();
      serverAvailable = true;
      return await res.json();
    } catch {
      serverAvailable = false;
      return null;
    }
  }

  function addSession(title, seconds, sections) {
    const entry = { title, seconds, date: Date.now(), sections: sections || [] };
    // Always save locally
    const sessions = getLocalSessions();
    sessions.unshift(entry);
    if (sessions.length > 100) sessions.length = 100;
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
    // Sync to server (fire-and-forget)
    fetch(SESSIONS_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    }).then(() => { serverAvailable = true; })
      .catch(() => { serverAvailable = false; });
  }

  function renderSessionList(sessions) {
    if (sessions.length === 0) {
      historyStats.innerHTML = '';
      historyList.innerHTML = '<div class="empty">No sessions recorded yet.<br>Use the teleprompter to start tracking.</div>';
      return;
    }

    const totalSessions = sessions.length;
    const totalTime = sessions.reduce((s, r) => s + r.seconds, 0);
    const avgTime = Math.round(totalTime / totalSessions);
    const bestTime = Math.min(...sessions.map(r => r.seconds));
    const longestTime = Math.max(...sessions.map(r => r.seconds));

    historyStats.innerHTML = `
      <div class="kpi-card"><div class="kpi-value">${totalSessions}</div><div class="kpi-label">Sessions</div></div>
      <div class="kpi-card"><div class="kpi-value">${fmtTime(avgTime)}</div><div class="kpi-label">Avg Time</div></div>
      <div class="kpi-card"><div class="kpi-value">${fmtTime(bestTime)}</div><div class="kpi-label">Shortest</div></div>
      <div class="kpi-card"><div class="kpi-value">${fmtTime(longestTime)}</div><div class="kpi-label">Longest</div></div>
      <div class="kpi-card"><div class="kpi-value">${fmtTime(totalTime)}</div><div class="kpi-label">Total</div></div>
    `;

    historyList.innerHTML = sessions.map((r, i) => {
      const d = new Date(r.date);
      const dateStr = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
                    + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      const hasSections = r.sections && r.sections.length > 0;
      const expandIcon = hasSections ? '<span class="si-expand">▶</span>' : '';
      let sectionHtml = '';
      if (hasSections) {
        const maxSec = Math.max(...r.sections.map(s => s.seconds));
        sectionHtml = `<div class="section-breakdown">${r.sections.map(s => {
          const pct = maxSec > 0 ? Math.round((s.seconds / maxSec) * 100) : 0;
          return `<div class="section-row">
            <span class="sr-text">${s.text}</span>
            <span class="sr-time">${fmtTime(s.seconds)}</span>
            <div class="sr-bar-wrap"><div class="sr-bar" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')}</div>`;
      }
      return `<div class="session-item" data-idx="${i}">
        <div class="si-info">
          <div class="si-title">${r.title} ${expandIcon}</div>
          <div class="si-meta">${dateStr}</div>
        </div>
        <span class="si-duration">${fmtTime(r.seconds)}</span>
        <button class="si-delete" data-idx="${i}" title="Remove">🗑</button>
      </div>${sectionHtml}`;
    }).join('');

    // Expand/collapse section breakdown
    historyList.querySelectorAll('.session-item').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('si-delete')) return;
        el.classList.toggle('expanded');
      });
    });

    historyList.querySelectorAll('.si-delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        if (serverAvailable) {
          try { await fetch(SESSIONS_API + '?idx=' + idx, { method: 'DELETE' }); } catch {}
        }
        const s = getLocalSessions();
        s.splice(idx, 1);
        localStorage.setItem(SESSIONS_KEY, JSON.stringify(s));
        await renderHistory();
      });
    });
  }

  async function renderHistory() {
    // Try server first; fall back to localStorage
    const serverData = await fetchServerSessions();
    const sessions = serverData || getLocalSessions();
    renderSessionList(sessions);
  }

  document.getElementById('btn-history').addEventListener('click', async () => {
    openPanel.classList.remove('visible');
    const vis = historyPanel.classList.contains('visible');
    if (vis) { historyPanel.classList.remove('visible'); return; }
    historyList.innerHTML = '<div class="empty">Loading…</div>';
    historyPanel.classList.add('visible');
    await renderHistory();
  });

  document.getElementById('history-close').addEventListener('click', () => {
    historyPanel.classList.remove('visible');
  });

  document.getElementById('history-clear').addEventListener('click', async () => {
    if (!confirm('Clear all session history?')) return;
    localStorage.removeItem(SESSIONS_KEY);
    if (serverAvailable) {
      try { await fetch(SESSIONS_API, { method: 'DELETE' }); } catch {}
    }
    await renderHistory();
  });

  document.addEventListener('mousedown', (e) => {
    if (historyPanel.classList.contains('visible') &&
        !historyPanel.contains(e.target) &&
        e.target.id !== 'btn-history') {
      historyPanel.classList.remove('visible');
    }
  });

  // ══════════════════════════════════════
  //  TIMER
  // ══════════════════════════════════════
  function fmtTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const mm = String(m).padStart(2, '0');
    const ss = String(sec).padStart(2, '0');
    return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  function updateTimerDisplay() {
    const t = fmtTime(timerSeconds);
    timerDisplay.textContent = t;
    overlayTotal.textContent = t;
    localStorage.setItem(TIMER_KEY, timerSeconds);
    // Update section timer in overlay
    if (currentSectionStartTime) {
      const sectionSecs = Math.round((Date.now() - currentSectionStartTime) / 1000);
      overlaySection.textContent = '§ ' + fmtTime(sectionSecs);
    }
  }

  function startTimerInterval() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (timerRunning) {
        timerSeconds++;
        updateTimerDisplay();
      }
    }, 1000);
  }

  function stopTimerInterval() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function startTimer() {
    timerSeconds = 0;
    timerRunning = true;
    updateTimerDisplay();
    timerDisplay.classList.remove('paused');
    timerBtn.textContent = '⏱ Pause';
    startTimerInterval();
  }

  function pauseTimer() {
    timerRunning = false;
    timerDisplay.classList.add('paused');
    timerBtn.textContent = '⏱ Resume';
  }

  function resumeTimer() {
    timerRunning = true;
    timerDisplay.classList.remove('paused');
    timerBtn.textContent = '⏱ Pause';
    startTimerInterval();
  }

  function resetTimer() {
    stopTimerInterval();
    timerSeconds = 0;
    timerRunning = false;
    updateTimerDisplay();
    localStorage.removeItem(TIMER_KEY);
    timerDisplay.classList.remove('paused');
    timerBtn.textContent = '⏱ Pause';
    updateStartBtn();
  }

  timerBtn.addEventListener('click', () => {
    timerRunning ? pauseTimer() : resumeTimer();
  });

  timerResetBtn.addEventListener('click', resetTimer);

  // ══════════════════════════════════════
  //  SECTION TIMING (per-paragraph tracking)
  // ══════════════════════════════════════
  function startSectionTracking() {
    sectionTimings = [];
    currentSectionEl = null;
    currentSectionStartTime = 0;
    overlaySection.textContent = '';
    // Kick off first section
    setTimeout(checkCurrentSection, 200);
  }

  function stopSectionTracking() {
    recordCurrentSection();
    currentSectionEl = null;
    currentSectionStartTime = 0;
    overlaySection.textContent = '';
  }

  function checkCurrentSection() {
    if (!inPrompter) return;
    const el = getElementAtCenter();
    if (!el || el === currentSectionEl) return;
    // Skip cues and slide markers for section timing
    if (el.classList.contains('cue') || el.classList.contains('next-slide')) return;
    // Record previous section
    recordCurrentSection();
    // Start new section
    currentSectionEl = el;
    currentSectionStartTime = Date.now();
  }

  function recordCurrentSection() {
    if (!currentSectionEl || !currentSectionStartTime) return;
    const elapsed = Math.round((Date.now() - currentSectionStartTime) / 1000);
    if (elapsed >= 1) {
      const text = currentSectionEl.textContent.trim().substring(0, 80);
      sectionTimings.push({ text, seconds: elapsed });
    }
  }

  // ══════════════════════════════════════
  //  BOOKMARK ("I am here")
  // ══════════════════════════════════════
  function hasRealText(el) {
    return el.textContent.replace(/[\s\u00a0]+/g, '').length > 0;
  }

  function getElementAtCenter() {
    // Find the text element closest to the reading line (~1/3 from top)
    const rect = scrollEl.getBoundingClientRect();
    const readingY = rect.top + rect.height * 0.5;
    const children = scrollEl.querySelectorAll('p, div:not(#prompter-scroll), h1, h2, blockquote, li');
    let closest = null;
    let closestDist = Infinity;
    for (const el of children) {
      // Skip empty elements (including &nbsp;-only)
      if (!hasRealText(el)) continue;
      const r = el.getBoundingClientRect();
      const elCenter = r.top + r.height / 2;
      const dist = Math.abs(elCenter - readingY);
      if (dist < closestDist) {
        closestDist = dist;
        closest = el;
      }
    }
    return closest;
  }

  function clearBookmark() {
    if (bookmarkEl) bookmarkEl.classList.remove('tp-marked');
    bookmarkEl = null;
    bookmarkScrollTop = null;
    markBtn.classList.remove('has-mark');
    localStorage.removeItem(BOOKMARK_KEY);
  }

  function setBookmark() {
    // Clear previous
    if (bookmarkEl) bookmarkEl.classList.remove('tp-marked');
    // Mark current element
    const el = getElementAtCenter();
    if (!el) return;
    el.classList.add('tp-marked');
    bookmarkEl = el;
    bookmarkScrollTop = scrollEl.scrollTop;
    markBtn.classList.add('has-mark');
    localStorage.setItem(BOOKMARK_KEY, scrollEl.scrollTop);
  }

  function advanceAndMark() {
    const scrollRect = scrollEl.getBoundingClientRect();
    // Content stops only — skip cues, slide markers, and empty/nbsp elements
    const stops = Array.from(
      scrollEl.querySelectorAll('p, h1, h2, blockquote, li')
    ).filter(el => hasRealText(el) && !el.closest('.cue') && !el.closest('.next-slide'));
    const currentEl = getElementAtCenter();
    if (!currentEl) return;
    // Mark current element
    if (bookmarkEl) bookmarkEl.classList.remove('tp-marked');
    currentEl.classList.add('tp-marked');
    bookmarkEl = currentEl;
    markBtn.classList.add('has-mark');
    // Find next stop by DOM order (not viewport position)
    let nextEl = null;
    const idx = stops.indexOf(currentEl);
    if (idx >= 0 && idx < stops.length - 1) {
      nextEl = stops[idx + 1];
    } else if (idx === -1) {
      // currentEl is a cue or other non-stop — find first stop after it in DOM
      for (const el of stops) {
        if (currentEl.compareDocumentPosition(el) & Node.DOCUMENT_POSITION_FOLLOWING) {
          nextEl = el;
          break;
        }
      }
    }
    if (nextEl) {
      // Center the next element in the viewport
      const nextRect = nextEl.getBoundingClientRect();
      const viewCenter = scrollRect.top + scrollRect.height / 2;
      const offset = (nextRect.top + nextRect.height / 2) - viewCenter;
      const newTop = scrollEl.scrollTop + offset;
      scrollEl.scrollTo({ top: newTop, behavior: 'smooth' });
      bookmarkScrollTop = newTop;
      localStorage.setItem(BOOKMARK_KEY, String(Math.round(newTop)));
    } else {
      // End of script — finalize session!
      bookmarkScrollTop = scrollEl.scrollTop;
      localStorage.setItem(BOOKMARK_KEY, String(Math.round(bookmarkScrollTop)));
      finalizeSession();
    }
  }

  function finalizeSession() {
    stop();
    pauseTimer();
    stopTimerInterval();
    stopSectionTracking();
    if (timerSeconds >= 1) {
      addSession(currentFileName || 'Untitled', timerSeconds, sectionTimings);
    }
    showCompletionScreen(timerSeconds);
  }

  function showCompletionScreen(seconds) {
    const svc = serviceTypeEl.value;
    let limitSecs;
    if (svc === 'grace') limitSecs = 1800;      // 30 min
    else if (svc === 'sunday') limitSecs = 2400; // 40 min
    else limitSecs = 0;                          // special — no limit

    const CONGRATS = {
      sunday: [
        "Congratulations, Pastor! You delivered THE WORD within 40 minutes. Clear, powerful, and on time!",
        "Congratulations! Solid message, well within the time. Your people heard THE WORD!",
        "Congratulations, Pastor! Tight, focused, and on point. Well done!",
        "Congratulations! THE WORD was delivered with clarity. Right on schedule, Pastor!"
      ],
      grace: [
        "Congratulations, Pastor! You finished within 30 minutes. Short, powerful, and to the point!",
        "Congratulations! Grace Night message delivered clean and on time!",
        "Congratulations, Pastor! 30 minutes or less \u2014 that's how you do Grace Night!",
        "Congratulations! Quick, clear, and Spirit-led. Perfect for Grace Night!"
      ]
    };
    const OOPS = {
      sunday: [
        "Oops! You went past 40 minutes, Pastor. Check your section times and see where to trim.",
        "Oops! A bit over time. Some points may need tightening. You'll get it next round!",
        "Oops! Went a little long, Pastor. Review which sections took the most time.",
        "Oops! Over 40 minutes, but THE WORD still went forth. Let's trim it next time!"
      ],
      grace: [
        "Oops! You went past 30 minutes, Pastor. Grace Night is meant to be quick!",
        "Oops! A bit over for Grace Night. See which sections you can shorten.",
        "Oops! Went a little long for Grace Night. Let's tighten it up!",
        "Oops! Over 30 minutes. Check your sections and find where to cut."
      ]
    };
    const SPECIAL = [
      "You took " + fmtTime(seconds) + " for that message. No time limit \u2014 THE WORD goes as long as it needs to!",
      "Total time: " + fmtTime(seconds) + ". Special event, special message. Hope it blessed the people!",
      fmtTime(seconds) + " total. No rush on special events \u2014 THE WORD was delivered!",
      "That was " + fmtTime(seconds) + ", Pastor. The Word took its course!"
    ];

    let msg;
    if (svc === 'special') {
      msg = SPECIAL[Math.floor(Math.random() * SPECIAL.length)];
    } else if (seconds <= limitSecs) {
      const pool = CONGRATS[svc];
      msg = pool[Math.floor(Math.random() * pool.length)];
    } else {
      const pool = OOPS[svc];
      msg = pool[Math.floor(Math.random() * pool.length)];
    }

    completionTime.textContent = fmtTime(seconds);
    completionMsg.textContent = msg;
    completionOverlay.classList.add('visible');
  }

  function restoreBookmark() {
    // Clear in-memory state
    if (bookmarkEl) bookmarkEl.classList.remove('tp-marked');
    bookmarkEl = null;
    bookmarkScrollTop = null;
    markBtn.classList.remove('has-mark');
    // Restore from localStorage
    const saved = localStorage.getItem(BOOKMARK_KEY);
    if (saved !== null) {
      const savedTop = parseInt(saved, 10);
      scrollEl.scrollTop = savedTop;
      bookmarkScrollTop = savedTop;
      const el = getElementAtCenter();
      if (el) {
        el.classList.add('tp-marked');
        bookmarkEl = el;
        markBtn.classList.add('has-mark');
      }
    }
  }

  function returnToBookmark() {
    if (!bookmarkEl) return;
    // Scroll to put the marked element near center
    const rect = scrollEl.getBoundingClientRect();
    const elRect = bookmarkEl.getBoundingClientRect();
    const offset = elRect.top - rect.top - rect.height / 2 + elRect.height / 2;
    scrollEl.scrollTop += offset;
  }

  markBtn.addEventListener('click', setBookmark);
  returnBtn.addEventListener('click', returnToBookmark);

  completionBtn.addEventListener('click', () => {
    completionOverlay.classList.remove('visible');
    resetTimer();
    clearBookmark();
    prompterView.style.display = 'none';
    editorView.style.display = 'flex';
    inPrompter = false;
    updateStartBtn();
    editor.focus();
  });

  // ── Prompter keyboard shortcuts ──
  document.addEventListener('keydown', (e) => {
    if (!inPrompter) return;

    switch (e.code) {
      case 'Enter':
        e.preventDefault();
        togglePlay();
        break;
      case 'Space':
        e.preventDefault();
        advanceAndMark();
        break;
      case 'Equal':
      case 'NumpadAdd':
        e.preventDefault();
        setSpeed(speed + 1);
        break;
      case 'Minus':
      case 'NumpadSubtract':
        e.preventDefault();
        setSpeed(speed - 1);
        break;
      case 'Home':
        e.preventDefault();
        scrollEl.scrollTop = 0;
        break;
      case 'End':
        e.preventDefault();
        scrollEl.scrollTop = scrollEl.scrollHeight;
        break;
      case 'KeyM':
        modeBtn.click();
        break;
      case 'KeyB':
        setBookmark();
        break;
      case 'KeyG':
        returnToBookmark();
        break;
      case 'KeyT':
        timerRunning ? pauseTimer() : resumeTimer();
        break;
      case 'KeyF':
        fsBtn.click();
        break;
      case 'Escape':
        backBtn.click();
        break;
    }
  });

  // ══════════════════════════════════════
  //  INIT — restore last session + file handle
  // ══════════════════════════════════════
  const savedDraft = localStorage.getItem(DRAFT_KEY);
  const savedName = localStorage.getItem(DRAFT_NAME_KEY);

  if (savedDraft) {
    editor.innerHTML = savedDraft;
    if (savedName) {
      currentFileName = savedName;
      isDirty = false;
    } else {
      isDirty = true;
    }
  } else {
    editor.innerHTML = '<p><br></p>';
  }

  // Restore file handle from IndexedDB (Chrome)
  const restoredHandle = await loadFileHandle();
  if (restoredHandle) {
    fileHandle = restoredHandle;
  }

  // Restore timer from previous session
  const savedTimer = parseInt(localStorage.getItem(TIMER_KEY), 10);
  if (savedTimer > 0) {
    timerSeconds = savedTimer;
    updateTimerDisplay();
    updateStartBtn();
  }

  updateTitle();
  editor.focus();

  // ── PWA: Register service worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/thewordtool-sw.js')
      .catch(() => {});
  }

})();
</script>
